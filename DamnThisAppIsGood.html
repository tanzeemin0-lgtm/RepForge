<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REP FORGE — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@300;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --success: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .date-display {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* NAV TABS */
  .nav {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 0 24px;
  }

  .nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .nav button:hover { color: var(--text); }

  /* MAIN */
  main { padding: 28px 24px; max-width: 960px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .section-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* EXERCISE CARDS */
  .exercises-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .ex-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    transition: border-color 0.2s;
  }

  .ex-card:hover { border-color: var(--accent); }

  .ex-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .ex-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .ex-tag {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  .ex-tag.body { background: rgba(232,255,71,0.12); color: var(--accent); }
  .ex-tag.weighted { background: rgba(255,107,53,0.12); color: var(--accent2); }

  /* INPUT ROWS */
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .input-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 60px;
    flex-shrink: 0;
  }

  .counter {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .cnt-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    line-height: 1;
    flex-shrink: 0;
  }

  .cnt-btn:hover { background: #333; }
  .cnt-btn.plus:hover { background: rgba(232,255,71,0.2); color: var(--accent); }
  .cnt-btn.minus:hover { background: rgba(255,107,53,0.15); color: var(--accent2); }

  .cnt-val {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    text-align: center;
    width: 60px;
    height: 30px;
    padding: 0 4px;
    letter-spacing: 1px;
  }

  .cnt-val:focus { outline: none; border-color: var(--accent); }

  .cnt-unit {
    font-size: 10px;
    color: var(--muted);
    width: 20px;
  }

  /* LOG BUTTON */
  .log-btn {
    width: 100%;
    margin-top: 14px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .log-btn:hover { background: #d4e83d; transform: translateY(-1px); }
  .log-btn:active { transform: translateY(0); }

  /* SET HISTORY */
  .set-log {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .set-chip {
    background: #1f1f1f;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    padding: 4px 10px;
    color: var(--success);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .set-chip .del-set {
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    transition: color 0.1s;
  }

  .set-chip .del-set:hover { color: var(--accent2); }

  /* TOTALS BAR */
  .totals-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 24px;
    display: flex;
    gap: 32px;
    margin-bottom: 24px;
    overflow-x: auto;
  }

  .total-item { text-align: center; min-width: 70px; }

  .total-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }

  .total-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* HISTORY SECTION */
  .history-list { display: flex; flex-direction: column; gap: 12px; }

  .history-day {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .history-date {
    background: var(--surface);
    padding: 12px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .history-entries { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }

  .history-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #1f1f1f;
  }

  .history-entry:last-child { border-bottom: none; }

  .h-ex-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 13px;
  }

  .h-sets { color: var(--muted); font-size: 11px; }

  /* CLEAR BTN */
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* SAVE DAY BUTTON */
  .save-day-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, var(--bg) 40%);
    padding: 32px 24px 24px;
    z-index: 50;
    pointer-events: none;
  }

  .save-day-btn {
    pointer-events: all;
    display: block;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 16px 24px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(232,255,71,0.25);
    transition: all 0.2s;
  }

  .save-day-btn:hover { background: #d4e83d; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,255,71,0.35); }
  .save-day-btn:active { transform: translateY(0); }
  .save-day-btn.saved { background: var(--success); box-shadow: 0 4px 24px rgba(74,222,128,0.25); color: #000; cursor: default; }

  #log { padding-bottom: 110px; }

  @media (max-width: 600px) {
    .section-title { font-size: 32px; }
    .exercises-grid { grid-template-columns: 1fr; }
    .totals-bar { gap: 20px; }
    .total-val { font-size: 28px; }
    header { padding: 0 16px; }
    main { padding: 20px 16px; }
    .nav { padding: 0 12px; }
    .nav button { padding: 12px 14px; font-size: 12px; }
    .save-day-wrap { padding: 28px 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">REP<span>FORGE</span></div>
  <div class="date-display" id="headerDate"></div>
</header>

<nav class="nav">
  <button class="active" onclick="showSection('log')">Today's Log</button>
  <button onclick="showSection('history')">History</button>
</nav>

<!-- STORAGE STATUS BAR -->
<div style="background:#111;border-bottom:1px solid #1e1e1e;padding:6px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
  <span id="storageStatus" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:#555;">Checking storage…</span>
  <div style="display:flex;gap:8px;">
    <button onclick="exportData()" style="background:none;border:1px solid #2a2a2a;color:#555;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:4px;cursor:pointer;">⬇ Backup</button>
    <button onclick="importData()" style="background:none;border:1px solid #2a2a2a;color:#555;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:4px;cursor:pointer;">⬆ Restore</button>
  </div>
</div>

<main>

  <!-- TODAY'S LOG SECTION -->
  <div id="log" class="section active">
    <div class="section-header" style="justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;align-items:baseline;gap:16px;">
        <div class="section-title">Today's<br>Workout</div>
        <div class="section-sub">Log your sets</div>
      </div>
      <button onclick="openAddPanel()" style="background:var(--accent);border:none;color:#000;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 18px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;white-space:nowrap;" onmouseover="this.style.background='#d4e83d';" onmouseout="this.style.background='var(--accent)';">
        <span style="font-size:18px;line-height:1;">+</span> Add Exercise
      </button>
    </div>

    <div class="totals-bar">
      <div class="total-item">
        <div class="total-val" id="totalSets">0</div>
        <div class="total-label">Total Sets</div>
      </div>
      <div class="total-item">
        <div class="total-val" id="totalReps">0</div>
        <div class="total-label">Total Reps</div>
      </div>
      <div class="total-item">
        <div class="total-val" id="totalVol">0</div>
        <div class="total-label">Vol (kg)</div>
      </div>
      <div class="total-item">
        <div class="total-val" id="totalExercises">0</div>
        <div class="total-label">Exercises</div>
      </div>
    </div>

    <div class="exercises-grid" id="exercisesGrid"></div>
  </div>

  <!-- HISTORY SECTION -->
  <div id="history" class="section">
    <div class="section-header" style="justify-content: space-between; flex-wrap: wrap; gap: 12px;">
      <div style="display:flex; align-items: baseline; gap: 16px;">
        <div class="section-title">History</div>
        <div class="section-sub">Past sessions</div>
      </div>
      <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</main>

<!-- SAVE DAY FLOATING BUTTON -->
<div class="save-day-wrap" id="saveDayWrap">
  <button class="save-day-btn" id="saveDayBtn" onclick="saveTodayLog()">
    💾 Save Today — <span id="saveDayLabel"></span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── EXERCISE CONFIG ───────────────────────────────────────────────────────
const CATEGORY_DEFS = [
  { id: 'push', label: 'Push',      color: '#e8ff47' },
  { id: 'pull', label: 'Pull',      color: '#ff6b35' },
  { id: 'legs', label: 'Legs & Core', color: '#4ade80' },
];

// Custom exercises loaded from localStorage
let customExercises = []; // [{id, name, type, hasWeight, isTimer, category}]

function getCategories() {
  return CATEGORY_DEFS.map(def => ({
    ...def,
    exercises: customExercises.filter(ex => ex.category === def.id)
  }));
}

function getAllExercises() {
  return customExercises;
}

// ─── STATE ────────────────────────────────────────────────────────────────
// todaySets: { [exId]: [{reps, weight}] }
let todaySets = {};
let history = [];  // [{date, sets}]

function loadData() {
  try {
    const d = localStorage.getItem('repforge_v2');
    if (d) {
      const parsed = JSON.parse(d);
      todaySets       = parsed.todaySets       || {};
      history         = parsed.history         || [];
      customExercises = parsed.customExercises || [];
    }
  } catch(e) {}
  rolloverDayIfNeeded();
}

function saveData() {
  localStorage.setItem('repforge_v2', JSON.stringify({ todaySets, history, lastDate: todayKey(), customExercises }));
  updateStorageStatus();
}

function todayKey() {
  return new Date().toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
}

function rolloverDayIfNeeded() {
  try {
    const raw = localStorage.getItem('repforge_v2');
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.lastDate && p.lastDate !== todayKey()) {
      // Save yesterday
      if (Object.keys(p.todaySets || {}).some(k => p.todaySets[k].length > 0)) {
        history.unshift({ date: p.lastDate, sets: p.todaySets });
        if (history.length > 60) history.pop();
      }
      todaySets = {};
    }
  } catch(e) {}
}

// ─── CURRENT INPUTS ──────────────────────────────────────────────────────
// Per-exercise current reps/weight input (live state, not logged yet)
const inputs = {};
function initInputs() {
  getAllExercises().forEach(ex => {
    if (!inputs[ex.id]) inputs[ex.id] = { reps: 0, weight: 0 };
  });
}

// ─── TIMER STATE (generic, per exercise) ─────────────────────────────────
const timerState = {}; // { [exId]: { interval, seconds, running } }

function getTimer(exId) {
  if (!timerState[exId]) timerState[exId] = { interval: null, seconds: 0, running: false };
  return timerState[exId];
}

function startStopTimer(exId) {
  const t = getTimer(exId);
  if (t.running) {
    clearInterval(t.interval);
    t.running = false;
    const btn = document.getElementById(`timer-startstop-${exId}`);
    if (btn) { btn.textContent = '▶ Start'; btn.style.background = 'var(--accent)'; }
  } else {
    t.running = true;
    const btn = document.getElementById(`timer-startstop-${exId}`);
    if (btn) { btn.textContent = '⏸ Pause'; btn.style.background = '#ff6b35'; }
    t.interval = setInterval(() => {
      t.seconds++;
      const m = String(Math.floor(t.seconds / 60)).padStart(2,'0');
      const s = String(t.seconds % 60).padStart(2,'0');
      const el = document.getElementById(`timer-display-${exId}`);
      if (el) el.textContent = m + ':' + s;
    }, 1000);
  }
}

function resetTimer(exId) {
  const t = getTimer(exId);
  clearInterval(t.interval);
  t.running = false;
  t.seconds = 0;
  const el = document.getElementById(`timer-display-${exId}`);
  if (el) el.textContent = '00:00';
  const btn = document.getElementById(`timer-startstop-${exId}`);
  if (btn) { btn.textContent = '▶ Start'; btn.style.background = 'var(--accent)'; }
}

function logTimerSet(exId) {
  const t = getTimer(exId);
  if (t.seconds <= 0) { showToast('Start the timer first!'); return; }
  if (!todaySets[exId]) todaySets[exId] = [];
  todaySets[exId].push({ reps: t.seconds, weight: 0 });
  resetTimer(exId);
  renderTimerChips(exId);
  saveData();
  updateTotals();
  showToast('Set logged!');
}

function deleteTimerSet(exId, idx) {
  if (!todaySets[exId]) return;
  todaySets[exId].splice(idx, 1);
  renderTimerChips(exId);
  saveData();
  updateTotals();
}

function renderTimerChips(exId) {
  const sets = todaySets[exId] || [];
  const chips = sets.map((s, i) => {
    const m = String(Math.floor(s.reps/60)).padStart(2,'0');
    const sec = String(s.reps%60).padStart(2,'0');
    return `<div class="set-chip">S${i+1}: ${m}:${sec} <span class="del-set" onclick="deleteTimerSet('${exId}',${i})">✕</span></div>`;
  }).join('');
  const el = document.getElementById(`sets-${exId}`);
  if (el) el.innerHTML = chips;
}

// Legacy plank aliases (kept for safety)
function startStopPlank() { startStopTimer('plank'); }
function resetPlank() { resetTimer('plank'); }
function logPlankSet() { logTimerSet('plank'); }
function deletePlankSet(idx) { deleteTimerSet('plank', idx); }

// ─── BUILD UI ─────────────────────────────────────────────
function buildGrid() {
  initInputs();
  const grid = document.getElementById('exercisesGrid');
  grid.innerHTML = '';

  const CATEGORIES = getCategories();

  // Empty state
  const totalEx = CATEGORIES.reduce((n, c) => n + c.exercises.length, 0);
  if (totalEx === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'grid-column:1/-1;';
    empty.innerHTML = `<div class="empty"><div class="empty-icon">🏋️</div>No exercises yet.<br>Hit <strong style="color:var(--accent)">+ Add Exercise</strong> to get started!</div>`;
    grid.appendChild(empty);
  }

  CATEGORIES.forEach(cat => {
    if (cat.exercises.length === 0) return;

    // Category header
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.style.cssText = `grid-column:1/-1; display:flex; align-items:center; gap:12px; margin-top:8px; margin-bottom:4px;`;
    header.innerHTML = `
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:${cat.color};">${cat.label}</div>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    `;
    grid.appendChild(header);

    cat.exercises.forEach(ex => {
      if (!inputs[ex.id]) inputs[ex.id] = { reps: 0, weight: 0 };
      const sets = todaySets[ex.id] || [];
      const card = document.createElement('div');
      card.className = 'ex-card';
      card.id = 'card-' + ex.id;
      card.style.position = 'relative';

      let weightRow = '';
      if (ex.hasWeight) {
        weightRow = `
          <div class="input-row">
            <span class="input-label">Weight</span>
            <div class="counter">
              <button class="cnt-btn minus" onclick="adjust('${ex.id}','weight',-0.5)">−</button>
              <input class="cnt-val" type="number" id="w-${ex.id}" value="${inputs[ex.id].weight}" min="0" step="0.5" onchange="inputs['${ex.id}'].weight=+this.value">
              <span class="cnt-unit">kg</span>
              <button class="cnt-btn plus" onclick="adjust('${ex.id}','weight',0.5)">+</button>
            </div>
          </div>`;
      }

      // Delete button (top-right corner)
      const deleteBtn = `<button onclick="deleteExercise('${ex.id}')" title="Remove exercise" style="position:absolute;top:10px;right:10px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all 0.15s;z-index:2;" onmouseover="this.style.borderColor='#ff6b35';this.style.color='#ff6b35';" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)';">✕</button>`;

      let innerHTML = '';
      if (ex.isTimer) {
        const timerChips = sets.map((s, i) => {
          const m = String(Math.floor(s.reps/60)).padStart(2,'0');
          const sec = String(s.reps%60).padStart(2,'0');
          return `<div class="set-chip">S${i+1}: ${m}:${sec} <span class="del-set" onclick="deleteTimerSet('${ex.id}',${i})">✕</span></div>`;
        }).join('');

        innerHTML = `
          ${deleteBtn}
          <div class="ex-header" style="padding-right:28px;">
            <div class="ex-name">${ex.name}</div>
            <span class="ex-tag body">Timed</span>
          </div>
          <div style="text-align:center;margin:10px 0;">
            <div id="timer-display-${ex.id}" style="font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;color:var(--accent);line-height:1;">00:00</div>
            <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;">minutes : seconds</div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:8px;">
            <button id="timer-startstop-${ex.id}" class="log-btn" style="flex:2;" onclick="startStopTimer('${ex.id}')">▶ Start</button>
            <button class="log-btn" style="flex:1;background:var(--border);color:var(--text);" onclick="resetTimer('${ex.id}')">Reset</button>
          </div>
          <button class="log-btn" onclick="logTimerSet('${ex.id}')">+ Log This Set</button>
          <div class="set-log" id="sets-${ex.id}">${timerChips}</div>
        `;
      } else {
        let setChips = sets.map((s, i) => {
          const label = ex.hasWeight ? `${s.reps}r × ${s.weight}kg` : `${s.reps} reps`;
          return `<div class="set-chip">S${i+1}: ${label} <span class="del-set" onclick="deleteSet('${ex.id}',${i})">✕</span></div>`;
        }).join('');

        innerHTML = `
          ${deleteBtn}
          <div class="ex-header" style="padding-right:28px;">
            <div class="ex-name">${ex.name}</div>
            <span class="ex-tag ${ex.type}">${ex.type === 'weighted' ? 'Dumbbell' : 'Bodyweight'}</span>
          </div>
          <div class="input-row">
            <span class="input-label">Reps</span>
            <div class="counter">
              <button class="cnt-btn minus" onclick="adjust('${ex.id}','reps',-1)">−</button>
              <input class="cnt-val" type="number" id="r-${ex.id}" value="${inputs[ex.id].reps}" min="0" onchange="inputs['${ex.id}'].reps=+this.value">
              <span class="cnt-unit">rep</span>
              <button class="cnt-btn plus" onclick="adjust('${ex.id}','reps',1)">+</button>
            </div>
          </div>
          ${weightRow}
          <button class="log-btn" onclick="logSet('${ex.id}')">+ Log Set</button>
          <div class="set-log" id="sets-${ex.id}">${setChips}</div>
        `;
      }

      card.innerHTML = innerHTML;
      grid.appendChild(card);
    });
  });

  updateTotals();
}

// ─── ADJUST ──────────────────────────────────────────────────────────────
function adjust(exId, field, delta) {
  inputs[exId][field] = Math.max(0, +(inputs[exId][field] + delta).toFixed(2));
  const elId = field === 'reps' ? `r-${exId}` : `w-${exId}`;
  const el = document.getElementById(elId);
  if (el) el.value = inputs[exId][field];
}

// ─── LOG SET ─────────────────────────────────────────────────────────────
function logSet(exId) {
  const reps = +document.getElementById(`r-${exId}`).value;
  const wEl  = document.getElementById(`w-${exId}`);
  const weight = wEl ? +wEl.value : 0;

  if (reps <= 0) { showToast('Enter reps first!'); return; }

  if (!todaySets[exId]) todaySets[exId] = [];
  todaySets[exId].push({ reps, weight });

  // Reset reps (keep weight)
  inputs[exId].reps = 0;
  const rEl = document.getElementById(`r-${exId}`);
  if (rEl) rEl.value = 0;

  // Update chips
  const ex = EXERCISES.find(e => e.id === exId);
  const sets = todaySets[exId];
  const chips = sets.map((s, i) => {
    const label = ex.hasWeight ? `${s.reps}r × ${s.weight}kg` : `${s.reps} reps`;
    return `<div class="set-chip">S${i+1}: ${label} <span class="del-set" onclick="deleteSet('${exId}',${i})">✕</span></div>`;
  }).join('');
  document.getElementById(`sets-${exId}`).innerHTML = chips;

  saveData();
  updateTotals();
  showToast('Set logged!');
}

// ─── DELETE SET ──────────────────────────────────────────────────────────
function deleteSet(exId, idx) {
  if (!todaySets[exId]) return;
  todaySets[exId].splice(idx, 1);
  const ex = EXERCISES.find(e => e.id === exId);
  const sets = todaySets[exId];
  const chips = sets.map((s, i) => {
    const label = ex.hasWeight ? `${s.reps}r × ${s.weight}kg` : `${s.reps} reps`;
    return `<div class="set-chip">S${i+1}: ${label} <span class="del-set" onclick="deleteSet('${exId}',${i})">✕</span></div>`;
  }).join('');
  document.getElementById(`sets-${exId}`).innerHTML = chips;
  saveData();
  updateTotals();
}

// ─── TOTALS ──────────────────────────────────────────────────────────────
function updateTotals() {
  let totalSets = 0, totalReps = 0, totalVol = 0, totalExercises = 0;
  getAllExercises().forEach(ex => {
    const sets = todaySets[ex.id] || [];
    if (sets.length > 0) totalExercises++;
    sets.forEach(s => {
      totalSets++;
      if (!ex.isTimer) totalReps += s.reps;
      totalVol  += s.reps * (s.weight || 0);
    });
  });
  document.getElementById('totalSets').textContent      = totalSets;
  document.getElementById('totalReps').textContent      = totalReps;
  document.getElementById('totalVol').textContent       = totalVol.toFixed(1);
  document.getElementById('totalExercises').textContent = totalExercises;
}

// ─── HISTORY ─────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No history yet.<br>Log some sets today!</div>`;
    return;
  }

  list.innerHTML = history.map(day => {
    let sets = 0, reps = 0, vol = 0;
    const allEx = getAllExercises();
    const entries = allEx.map(ex => {
      const s = (day.sets[ex.id] || []);
      if (!s.length) return '';
      sets += s.length;
      s.forEach(r => { reps += r.reps; vol += r.reps * (r.weight || 0); });
      const detail = s.map((r,i) => {
        let lbl;
        if (ex.isTimer) {
          const m = String(Math.floor(r.reps/60)).padStart(2,'0');
          const s2 = String(r.reps%60).padStart(2,'0');
          lbl = m+':'+s2;
        } else {
          lbl = ex.hasWeight ? `${r.reps}r×${r.weight}kg` : `${r.reps}r`;
        }
        return `S${i+1}:${lbl}`;
      }).join('  ');
      return `<div class="history-entry">
        <span class="h-ex-name">${ex.name}</span>
        <span class="h-sets">${detail}</span>
      </div>`;
    }).filter(Boolean).join('');

    return `<div class="history-day">
      <div class="history-date">
        <span>${day.date}</span>
        <span style="font-size:11px;color:var(--muted);font-weight:400;letter-spacing:1px;">${sets} sets · ${reps} reps · ${vol.toFixed(1)}kg</span>
      </div>
      <div class="history-entries">${entries || '<span style="color:var(--muted);font-size:12px;">No sets logged.</span>'}</div>
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('Clear all history? This cannot be undone.')) return;
  history = [];
  saveData();
  renderHistory();
  showToast('History cleared');
}

// ─── SAVE TODAY'S LOG ────────────────────────────────────────────────────
function saveTodayLog() {
  const hasAnySets = Object.keys(todaySets).some(k => (todaySets[k] || []).length > 0);
  if (!hasAnySets) { showToast('Nothing logged yet!'); return; }

  const dateKey = todayKey();

  // Check if today already saved — update it
  const existingIdx = history.findIndex(h => h.date === dateKey);
  if (existingIdx !== -1) {
    history[existingIdx] = { date: dateKey, sets: JSON.parse(JSON.stringify(todaySets)) };
  } else {
    history.unshift({ date: dateKey, sets: JSON.parse(JSON.stringify(todaySets)) });
    if (history.length > 60) history.pop();
  }

  saveData();

  const btn = document.getElementById('saveDayBtn');
  btn.classList.add('saved');
  btn.textContent = '✅ Saved — ' + dateKey;
  showToast('Today saved to history!');
}

function updateSaveBtnLabel() {
  const el = document.getElementById('saveDayLabel');
  if (el) el.textContent = new Date().toLocaleDateString('en-US', { day:'numeric', month:'long', year:'numeric' });
}

// ─── NAV ─────────────────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => {
    if (b.getAttribute('onclick').includes(id)) b.classList.add('active');
  });
  if (id === 'history') renderHistory();
  // Show save button only on log tab
  const wrap = document.getElementById('saveDayWrap');
  if (wrap) wrap.style.display = id === 'log' ? '' : 'none';
}

// ─── TOAST ───────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── DATE ────────────────────────────────────────────────────────────────
function updateDate() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });
}

// ─── STORAGE STATUS ──────────────────────────────────────────────────────
function updateStorageStatus() {
  const el = document.getElementById('storageStatus');
  if (!el) return;
  try {
    const raw = localStorage.getItem('repforge_v2');
    if (raw) {
      const kb = (new Blob([raw]).size / 1024).toFixed(1);
      el.textContent = '💾 Data saved locally · ' + kb + ' KB';
      el.style.color = 'var(--success)';
    } else {
      el.textContent = '⚠ No saved data yet — log some sets!';
      el.style.color = 'var(--muted)';
    }
  } catch(e) {
    el.textContent = '⚠ Storage blocked — try a different browser';
    el.style.color = 'var(--accent2)';
  }
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────
function exportData() {
  const data = localStorage.getItem('repforge_v2');
  if (!data) { showToast('Nothing to export!'); return; }
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'repforge-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded!');
}

function importData() {
  const inp = document.createElement('input');
  inp.type  = 'file';
  inp.accept = '.json,application/json';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.todaySets && !parsed.history) throw new Error('Invalid');
        localStorage.setItem('repforge_v2', ev.target.result);
        todaySets       = parsed.todaySets       || {};
        history         = parsed.history         || [];
        customExercises = parsed.customExercises || [];
        buildGrid();
        updateTotals();
        updateStorageStatus();
        showToast('Data restored!');
      } catch(err) {
        showToast('Invalid backup file');
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ─── ADD / DELETE EXERCISE ────────────────────────────────────────────────
function openAddPanel() {
  document.getElementById('addExPanel').style.display = 'flex';
  document.getElementById('newExName').value = '';
  // Reset selections
  document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('sel-active'));
  document.querySelectorAll('[data-selgroup="extype"]')[0].classList.add('sel-active'); // default: bodyweight
  selectedExType = 'body';
  selectedExCat = null;
  document.getElementById('newExName').focus();
}

function closeAddPanel() {
  document.getElementById('addExPanel').style.display = 'none';
}

let selectedExType = 'body';
let selectedExCat  = null;

function selectExType(type, el) {
  selectedExType = type;
  document.querySelectorAll('[data-selgroup="extype"]').forEach(b => b.classList.remove('sel-active'));
  el.classList.add('sel-active');
}

function selectExCat(cat, el) {
  selectedExCat = cat;
  document.querySelectorAll('[data-selgroup="excat"]').forEach(b => b.classList.remove('sel-active'));
  el.classList.add('sel-active');
}

function confirmAddExercise() {
  const name = document.getElementById('newExName').value.trim();
  if (!name) { showToast('Enter a name!'); return; }
  if (!selectedExCat) { showToast('Choose Push / Pull / Legs!'); return; }

  const id = 'custom_' + Date.now();
  const isTimer   = selectedExType === 'timing';
  const hasWeight = selectedExType === 'weighted';
  const type      = selectedExType === 'weighted' ? 'weighted' : 'body';

  customExercises.push({ id, name, type, hasWeight, isTimer, category: selectedExCat });
  inputs[id] = { reps: 0, weight: 0 };

  saveData();
  buildGrid();
  closeAddPanel();
  showToast(`"${name}" added!`);
}

function deleteExercise(exId) {
  const ex = customExercises.find(e => e.id === exId);
  if (!ex) return;
  if (!confirm(`Remove "${ex.name}" from your exercises?`)) return;
  // Stop any running timer
  if (timerState[exId]) {
    clearInterval(timerState[exId].interval);
    delete timerState[exId];
  }
  customExercises = customExercises.filter(e => e.id !== exId);
  delete inputs[exId];
  delete todaySets[exId];
  saveData();
  buildGrid();
  showToast('Exercise removed');
}

// ─── INIT ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  loadData();
  updateDate();
  updateSaveBtnLabel();
  buildGrid();
  updateStorageStatus();

  // Init default selection state
  selectedExType = 'body';
  selectedExCat  = null;
});
</script>
